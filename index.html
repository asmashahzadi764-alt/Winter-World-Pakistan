<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Winter World Pakistan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!--------------------- NAVBAR ------->
  <nav class="navbar">
    <div class="nav-logo">
      <img src="assets/logo.svg" alt="Winter World Logo" />
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">HOME</a></li>
      <li><a href="#">ABOUT US</a></li>
      <li><a href="#">EXPERIENCES</a></li>
    </ul>
    <a href="#" class="btn-book">BOOK NOW</a>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </nav>

  <!------------- HERO SECTION ------------>
  <section class="hero">
    <picture>
      <source srcset="assets/Banner-mobile.jpg" media="(max-width: 768px)" />
      <source srcset="assets/Banner-desktop.jpg" media="(min-width: 769px)" />
      <img src="assets/Banner.jpg" alt="Winterland 2.0 Banner" class="hero-bg" />
    </picture>
    <div class="hero-overlay"></div>

    <!------------- Cart ------------>
    <div class="cart-btn">
      <span class="cart-count">0</span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </div>
  </section>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });
  </script>

</body>
</html>
